<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ระบบสะสมแต้มหน้าร้าน (Loyalty Point System)</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <link href="https://fonts.googleapis.com/css2?family=Kanit:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Kanit', sans-serif; }
    </style>
</head>
<body class="bg-gray-100 min-h-screen flex flex-col items-center justify-center p-4">

    <div class="bg-white p-6 rounded-2xl shadow-xl w-full max-w-md">
        <div class="text-center mb-6">
            <h1 class="text-2xl font-bold text-indigo-600">☕ Cafe Loyalty Point</h1>
            <p class="text-gray-500 text-sm">ระบบสะสมแต้มสำหรับพนักงานหน้าร้าน</p>
        </div>

        <div class="mb-6 bg-indigo-50 p-4 rounded-xl border border-indigo-100">
            <label class="block text-sm font-semibold text-indigo-900 mb-2">ระบุเบอร์โทรศัพท์ลูกค้า</label>
            <div class="flex gap-2">
                <input type="tel" id="phoneInput" placeholder="เช่น 0812345678" 
                       class="flex-1 px-3 py-2 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-indigo-500 text-center text-lg tracking-wider">
                <button onclick="checkCustomer()" class="bg-indigo-600 hover:bg-indigo-700 text-white px-4 py-2 rounded-lg font-medium transition">
                    ตรวจสอบ
                </button>
            </div>
        </div>

        <div id="customerSection" class="hidden border border-gray-200 rounded-xl p-4 mb-6">
            <div class="flex justify-between items-center mb-3">
                <div>
                    <p class="text-xs text-gray-400">เบอร์โทรศัพท์ลูกค้า</p>
                    <p id="displayPhone" class="text-lg font-bold text-gray-700"></p>
                </div>
                <div class="text-right">
                    <p class="text-xs text-gray-400">แต้มสะสมปัจจุบัน</p>
                    <p id="displayPoints" class="text-2xl font-bold text-amber-500">0 <span class="text-xs text-gray-500">แต้ม</span></p>
                </div>
            </div>

            <hr class="border-gray-100 my-3">

            <div class="space-y-3">
                <div>
                    <label class="block text-xs font-semibold text-gray-600 mb-1">จำนวนแต้มที่ต้องการจัดการ</label>
                    <input type="number" id="pointAmount" value="1" min="1" 
                           class="w-full px-3 py-2 border border-gray-300 rounded-lg text-center font-bold">
                </div>
                <div class="flex gap-2">
                    <button onclick="updatePoints('earn')" class="flex-1 bg-emerald-500 hover:bg-emerald-600 text-white py-2 rounded-lg font-medium transition">
                        + สะสมแต้ม
                    </button>
                    <button onclick="updatePoints('redeem')" class="flex-1 bg-rose-500 hover:bg-rose-600 text-white py-2 rounded-lg font-medium transition">
                        - แลกแต้ม
                    </button>
                </div>
            </div>
        </div>

        <div id="statusMessage" class="hidden p-3 rounded-lg text-center text-sm font-medium"></div>
    </div>

    <script>
        // จำลองฐานข้อมูลลูกค้าไว้ใน LocalStorage ของเบราว์เซอร์ (ปิดเว็บเปิดใหม่ข้อมูลยังอยู่)
        let customerDB = JSON.parse(localStorage.getItem('customerDB')) || {
            "0812345678": { points: 15 },
            "0998765432": { points: 5 }
        };

        let currentActivePhone = "";

        // ฟังก์ชันบันทึกข้อมูลลง LocalStorage
        function saveDB() {
            localStorage.setItem('customerDB', JSON.stringify(customerDB));
        }

        // ฟังก์ชันแสดงข้อความแจ้งเตือน
        function showMessage(text, type) {
            const msgBox = document.getElementById('statusMessage');
            msgBox.innerText = text;
            msgBox.className = `p-3 rounded-lg text-center text-sm font-medium block ${
                type === 'success' ? 'bg-emerald-100 text-emerald-800' : 
                type === 'error' ? 'bg-rose-100 text-rose-800' : 'bg-blue-100 text-blue-800'
            }`;
        }

        // ฟังก์ชันตรวจสอบเบอร์โทรศัพท์
        function checkCustomer() {
            const phone = document.getElementById('phoneInput').value.trim();
            
            if (phone.length < 9 || isNaN(phone)) {
                showMessage("กรุณากรอกเบอร์โทรศัพท์ให้ถูกต้อง", "error");
                document.getElementById('customerSection').classList.add('hidden');
                return;
            }

            currentActivePhone = phone;
            
            // ถ้าไม่เจอเบอร์ในฐานข้อมูล จะถือว่าเป็นลูกค้าใหม่สมัครสมาชิกทันที
            if (!customerDB[phone]) {
                customerDB[phone] = { points: 0 };
                saveDB();
                showMessage("✨ ยินดีต้อนรับ! สมัครสมาชิกใหม่เรียบร้อย", "success");
            } else {
                showMessage("ค้นหาข้อมูลลูกค้าสำเร็จ", "info");
            }

            // แสดงหน้าจอจัดการแต้ม
            document.getElementById('displayPhone').innerText = phone;
            document.getElementById('displayPoints').innerHTML = `${customerDB[phone].points} <span class="text-xs text-gray-500">แต้ม</span>`;
            document.getElementById('customerSection').classList.remove('hidden');
        }

        // ฟังก์ชันเพิ่มหรือลดแต้ม
        function updatePoints(action) {
            const amountInput = document.getElementById('pointAmount');
            const amount = parseInt(amountInput.value);

            if (isNaN(amount) || amount <= 0) {
                showMessage("กรุณาระบุจำนวนแต้มที่ถูกต้อง", "error");
                return;
            }

            if (action === 'earn') {
                customerDB[currentActivePhone].points += amount;
                showMessage(`สะสมแต้มสำเร็จ! ได้รับ +${amount} แต้ม`, "success");
            } else if (action === 'redeem') {
                if (customerDB[currentActivePhone].points < amount) {
                    showMessage("❌ แต้มสะสมไม่เพียงพอสำหรับการแลก", "error");
                    return;
                }
                customerDB[currentActivePhone].points -= amount;
                showMessage(`แลกแต้มสำเร็จ! หักออก -${amount} แต้ม`, "success");
            }

            // อัปเดตข้อมูลและแสดงผลใหม่
            saveDB();
            document.getElementById('displayPoints').innerHTML = `${customerDB[currentActivePhone].points} <span class="text-xs text-gray-500">แต้ม</span>`;
            amountInput.value = 1; // reset ตัวเลขกลับเป็น 1
        }
    </script>
</body>
</html>
